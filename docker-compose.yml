services:
  rust-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rust-backend
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - PORT=3000  # 本地开发固定为 3000，Railway 会自动覆盖
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: react-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://rust-backend:3000  # 本地开发使用内网地址
      - PORT=5173  # 本地开发固定为 5173，Railway 会自动覆盖
    depends_on:
      rust-backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge