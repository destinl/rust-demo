# Railway 项目配置
# 这是一个参考配置文件，不是必须的
# 你也可以在 Railway Dashboard 中手动配置

[[services]]
name = "rust-backend"
dockerfile = "./backend/Dockerfile"
port = 3000

  [services.build]
  buildCommand = "cargo build --release"

  [[services.env]]
  name = "RUST_LOG"
  value = "info"

[[services]]
name = "react-frontend"
dockerfile = "./frontend/Dockerfile"
port = 5173

  # ⚠️ 关键：以下配置仅用于 Docker Compose 本地开发
  # Railway 部署时，必须在 Dashboard 中手动设置:
  # BACKEND_URL=https://rust-backend-production-xxxx.up.railway.app
  
  [[services.env]]
  name = "BACKEND_URL"
  value = "http://rust-backend:3000"
  # ^ 本地开发默认值，Railway 部署时需要覆盖为后端的公网 HTTPS URL
