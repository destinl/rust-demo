# Railway 项目配置
# 将此文件上传到项目根目录以启用自动部署配置

[[services]]
name = "rust-backend"
dockerfile = "./backend/Dockerfile"
port = 3000

  [services.build]
  buildCommand = "cargo build --release"

  [[services.env]]
  name = "PORT"
  value = "3000"

[[services]]
name = "react-frontend"
dockerfile = "./frontend/Dockerfile"
port = 5173

  [[services.env]]
  name = "PORT"
  value = "5173"

  # ⚠️ 重要提示：这里的 BACKEND_URL 需要在 Railway Dashboard 中设置为后端服务的实际公网 URL
  # 例如：https://rust-demo-production.up.railway.app
  # 或者使用 Railway 的环境变量引用（如果支持）
  # 本地开发时使用 http://rust-backend:3000，Railway 部署时需要改为实际公网URL
  [[services.env]]
  name = "BACKEND_URL"
  value = ""  # Railway Dashboard 中需要手动设置为真实的后端公网URL
